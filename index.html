<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>еӘ’дҪ“жҸҗеҸ–е·Ҙе…· - Media Extractor</title>
<style>
:root {
  --bg: #0f0f23;
  --card: #1a1a2e;
  --border: #2a2a4a;
  --accent: #e94560;
  --accent2: #0f3460;
  --text: #eee;
  --text2: #8892b0;
  --success: #2ecc71;
  --warn: #f39c12;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height:100vh; }
.app { max-width:800px; margin:0 auto; padding:20px; }
.header { text-align:center; padding:30px 0 20px; }
.header h1 { font-size:28px; background:linear-gradient(135deg, #e94560, #f39c12); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header .sub { color:var(--text2); margin-top:6px; font-size:14px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; }
.card-title { font-size:16px; font-weight:600; margin-bottom:14px; display:flex; align-items:center; gap:8px; }

/* Input */
.input-row { display:flex; gap:10px; }
.input-row input { flex:1; padding:12px 16px; background:#0a0a1a; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; transition:border .2s; }
.input-row input:focus { border-color:var(--accent); }
.btn { padding:12px 24px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; white-space:nowrap; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#c0392b; }
.btn-primary:disabled { opacity:0.5; cursor:default; }
.btn-sm { padding:8px 16px; font-size:12px; }
.btn-outline { background:transparent; border:1px solid var(--accent); color:var(--accent); }
.btn-outline:hover { background:var(--accent); color:#fff; }

/* Platform badges */
.platforms { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.platform-badge { padding:6px 14px; border-radius:20px; font-size:12px; cursor:pointer; border:1px solid var(--border); transition:all .2s; }
.platform-badge:hover, .platform-badge.active { border-color:var(--accent); background:rgba(233,69,96,.1); }
.platform-badge.douyin { color:#ff0050; }
.platform-badge.xiaohongshu { color:#fe2c55; }
.platform-badge.bilibili { color:#fb7299; }

/* Result */
.result { margin-top:16px; }
.result-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.result-card { background:#0a0a1a; border-radius:8px; overflow:hidden; }
.result-card img, .result-card video { width:100%; display:block; max-height:300px; object-fit:contain; background:#000; }
.result-info { padding:12px; }
.result-info .title { font-size:14px; font-weight:600; margin-bottom:4px; }
.result-info .meta { font-size:12px; color:var(--text2); }
.result-actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }

/* Progress */
.progress-wrap { margin-top:12px; }
.progress-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:var(--accent); width:0; transition:width .3s; }
.progress-text { font-size:12px; color:var(--text2); margin-top:4px; }

/* Log */
.log-area { max-height:200px; overflow-y:auto; font-size:12px; color:var(--text2); }
.log-line { padding:3px 0; border-bottom:1px solid rgba(255,255,255,.03); }
.log-line.error { color:var(--accent); }
.log-line.success { color:var(--success); }

/* Reply */
.comment { background:#0a0a1a; border-radius:6px; padding:10px 12px; margin-bottom:8px; }
.comment .user { font-weight:600; font-size:13px; color:var(--accent); }
.comment .text { font-size:13px; margin-top:4px; color:var(--text2); }
.comment .time { font-size:11px; color:#555; margin-top:2px; }

.hidden { display:none !important; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>рҹ“Ў еӘ’дҪ“жҸҗеҸ–е·Ҙе…·</h1>
    <div class="sub">жҠ–йҹі В· е°Ҹзәўд№?В· Bз«?| и§Ҷйў‘/еӣҫж–ҮжҸҗеҸ– В· йҹійў‘дёӢиҪҪ В· иҜ„и®әжҠ“еҸ–</div>
  </div>

  <div class="card">
    <div class="card-title">рҹ”— зІҳиҙҙй“ҫжҺҘ</div>
    <div class="platforms">
      <span class="platform-badge douyin active" data-p="douyin">рҹҺө жҠ–йҹі</span>
      <span class="platform-badge xiaohongshu" data-p="xiaohongshu">рҹ“• е°Ҹзәўд№?/span>
      <span class="platform-badge bilibili" data-p="bilibili">рҹ“ә Bз«?/span>
    </div>
    <div class="input-row">
      <input type="text" id="linkInput" placeholder="зІҳиҙҙжҠ–йҹі/е°Ҹзәўд№?Bз«ҷеҲҶдә«й“ҫжҺ?..">
      <button class="btn btn-primary" id="btnParse">рҹ”Қ и§Јжһҗ</button>
    </div>
    <div class="progress-wrap hidden" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>
  </div>

  <div class="card hidden" id="resultCard">
    <div class="card-title">рҹ“Ӣ жҸҗеҸ–з»“жһң</div>
    <div id="resultArea"></div>
  </div>

  <div class="card hidden" id="commentCard">
    <div class="card-title">рҹ’¬ иҜ„и®әеҢ?/div>
    <div id="commentArea"></div>
  </div>

  <div class="card">
    <div class="log-area" id="logArea">
      <div class="log-line">рҹҹў е·Ҙе…·е°ұз»ӘпјҢзІҳиҙҙй“ҫжҺҘејҖе§ӢжҸҗеҸ–гҖ?/div>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

const state = { platform: 'douyin', result: null, proxyUrl: 'https://admirable-blini-006cf0.netlify.app/api/extract' };

// Platform badges
$$('.platform-badge').forEach(b => {
  b.addEventListener('click', () => {
    $$('.platform-badge').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.platform = b.dataset.p;
  });
});

// Auto-detect platform from URL
$('#linkInput').addEventListener('input', () => {
  const url = $('#linkInput').value;
  if (url.includes('douyin.com')) updatePlatform('douyin');
  else if (url.includes('xiaohongshu.com') || url.includes('xhslink.com')) updatePlatform('xiaohongshu');
  else if (url.includes('bilibili.com') || url.includes('b23.tv')) updatePlatform('bilibili');
});

function updatePlatform(p) {
  state.platform = p;
  $$('.platform-badge').forEach(x => x.classList.toggle('active', x.dataset.p === p));
}

// Log
function log(msg, cls='info') {
  const d = document.createElement('div');
  d.className = `log-line ${cls}`;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  $('#logArea').appendChild(d);
  $('#logArea').scrollTop = $('#logArea').scrollHeight;
}

// Progress
function showProgress(text) {
  $('#progressWrap').classList.remove('hidden');
  $('#progressText').textContent = text;
  $('#progressFill').style.width = '30%';
}
function hideProgress() { $('#progressWrap').classList.add('hidden'); }

// Parse
$('#btnParse').addEventListener('click', async () => {
  const url = $('#linkInput').value.trim();
  if (!url) { log('иҜ·зІҳиҙҙй“ҫжҺ?, 'error'); return; }

  $('#btnParse').disabled = true;
  $('#btnParse').textContent = 'вҸ?и§Јжһҗдё?..';
  showProgress('жӯЈеңЁи§Јжһҗ...');
  log(`ејҖе§Ӣи§Јжһ? ${url}`);

  try {
    const apiUrl = state.proxyUrl.startsWith('/') 
      ? state.proxyUrl 
      : state.proxyUrl;
    
    const resp = await fetch(apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, type: 'parse' })
    });
    const data = await resp.json();
    $('#progressFill').style.width = '80%';

    if (!data.success && data.error) {
      throw new Error(data.error);
    }

    state.result = data;
    renderResult(data);
    $('#resultCard').classList.remove('hidden');
    $('#progressFill').style.width = '100%';
    log(`вң?и§ЈжһҗжҲҗеҠҹ: ${data.title || 'жңӘзҹҘж Үйўҳ'}`, 'success');
  } catch (err) {
    log(`вқ?и§ЈжһҗеӨұиҙҘ: ${err.message}`, 'error');
  } finally {
    hideProgress();
    $('#btnParse').disabled = false;
    $('#btnParse').textContent = 'рҹ”Қ и§Јжһҗ';
  }
});

function renderResult(data) {
  const area = $('#resultArea');
  let html = '';

  // Media preview
  if (data.type === 'video' && data.videoUrl) {
    html += `<video src="${data.videoUrl}" controls style="width:100%;max-height:400px;border-radius:8px;background:#000"></video>`;
  } else if (data.type === 'video') {
    html += '<div style="padding:40px;text-align:center;color:var(--text2)">рҹҺ¬ и§Ҷйў‘й“ҫжҺҘйңҖйҖҡиҝҮз¬¬дёүж–№е·Ҙе…·иҺ·еҸ?/div>';
  }

  if (data.cover && !data.videoUrl) {
    html += `<img src="${data.cover}" style="width:100%;max-height:300px;object-fit:contain;border-radius:8px;background:#000">`;
  }

  // Images
  if (data.images && data.images.length > 0) {
    html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px">';
    data.images.forEach(img => {
      html += `<img src="${img}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;cursor:pointer" onclick="window.open('${img}')">`;
    });
    html += '</div>';
  }

  // Info
  html += '<div style="margin-top:12px">';
  if (data.title) html += `<div style="font-weight:600;font-size:15px">${data.title}</div>`;
  if (data.author) html += `<div style="color:var(--accent);font-size:13px;margin-top:4px">рҹ‘Ө ${data.author}</div>`;
  if (data.description) html += `<div style="color:var(--text2);font-size:13px;margin-top:4px">${data.description}</div>`;
  html += '</div>';

  // Actions
  html += '<div class="result-actions">';
  if (data.videoUrl) {
    html += `<button class="btn btn-primary btn-sm" onclick="downloadMedia('${data.videoUrl}', 'video.mp4')">в¬?дёӢиҪҪи§Ҷйў‘</button>`;
  }
  if (data.cover) {
    html += `<button class="btn btn-outline btn-sm" onclick="downloadMedia('${data.cover}', 'cover.jpg')">рҹ–ј дёӢиҪҪе°Ғйқў</button>`;
  }
  if (data.images) {
    html += `<button class="btn btn-outline btn-sm" onclick="downloadAllImages()">рҹ“Ұ дёӢиҪҪе…ЁйғЁеӣҫзүҮ</button>`;
  }
  html += `<button class="btn btn-outline btn-sm" id="btnFetchComments">рҹ’¬ жҹҘзңӢиҜ„и®ә</button>`;
  html += '</div>';

  area.innerHTML = html;

  // Comments button
  $('#btnFetchComments')?.addEventListener('click', fetchComments);
}

function downloadMedia(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.target = '_blank';
  a.click();
  log(`ејҖе§ӢдёӢиҪ? ${filename}`);
}

function downloadAllImages() {
  if (!state.result?.images) return;
  state.result.images.forEach((img, i) => {
    setTimeout(() => downloadMedia(img, `image_${i+1}.jpg`), i * 500);
  });
  log(`жӯЈеңЁдёӢиҪҪ ${state.result.images.length} еј еӣҫзү?..`);
}

async function fetchComments() {
  $('#btnFetchComments').disabled = true;
  $('#btnFetchComments').textContent = 'вҸ?еҠ иҪҪдё?..';
  log('жӯЈеңЁиҺ·еҸ–иҜ„и®ә...');

  try {
    const resp = await fetch(state.proxyUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: $('#linkInput').value.trim(), type: 'comments' })
    });
    const data = await resp.json();
    
    if (data.success && data.comments) {
      renderComments(data.comments);
    } else {
      log(data.message || 'жҡӮж— иҜ„и®әж•°жҚ®', 'error');
    }
  } catch (err) {
    log(`иҜ„и®әиҺ·еҸ–еӨұиҙҘ: ${err.message}`, 'error');
  } finally {
    $('#btnFetchComments').disabled = false;
    $('#btnFetchComments').textContent = 'рҹ’¬ жҹҘзңӢиҜ„и®ә';
  }
}

function renderComments(comments) {
  const area = $('#commentArea');
  let html = '';
  comments.forEach(c => {
    html += `<div class="comment">
      <div class="user">${c.user}</div>
      <div class="text">${c.text}</div>
      <div class="time">${c.time || ''}</div>
    </div>`;
  });
  area.innerHTML = html;
  $('#commentCard').classList.remove('hidden');
  log(`еҠ иҪҪдә?${comments.length} жқЎиҜ„и®ә`, 'success');
}

// Init
log('рҹ’Ў ж”ҜжҢҒ: жҠ–йҹізҹӯй“ҫжҺ?/ е°Ҹзәўд№ҰеҲҶдә«й“ҫжҺ?/ Bз«ҷи§Ҷйў‘й“ҫжҺ?);
log('вҡ?йғЁеҲҶе№іеҸ°йңҖиҰҒзҷ»еҪ•CookieжүҚиғҪе®Ңж•ҙи§ЈжһҗпјҢеҹәзЎҖдҝЎжҒҜеҸҜзӣҙжҺҘжҸҗеҸ?);
</script>
</body>
</html>

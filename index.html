<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>媒体提取工具 - Media Extractor</title>
<style>
:root { --bg: #0f0f1a; --card: #1a1a2e; --accent: #e94560; --text: #eee; --text2: #999; --border: #2a2a4a; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
.app { max-width: 680px; margin: 0 auto; padding: 20px 16px 40px; }
.header { text-align: center; padding: 20px 0 10px; }
.header h1 { font-size: 24px; margin-bottom: 4px; }
.header .sub { color: var(--text2); font-size: 13px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.platforms { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.platform-badge { padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); color: var(--text2); transition: all .2s; }
.platform-badge:hover { border-color: var(--accent); color: var(--text); }
.platform-badge.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.input-row { display: flex; gap: 10px; }
.input-row input { flex: 1; padding: 12px 16px; background: #12122a; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
.input-row input:focus { border-color: var(--accent); }
.btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all .2s; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.progress-wrap { margin-top: 12px; }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); width: 0; transition: width .3s; }
.progress-text { font-size: 12px; color: var(--text2); margin-top: 6px; }
.result-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.log-area { height: 200px; overflow-y: auto; font-size: 13px; font-family: 'Consolas', 'Courier New', monospace; }
.log-line { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.03); }
.log-line.error { color: #f87171; }
.log-line.success { color: #4ade80; }
.log-line.info { color: var(--text2); }
.comment { padding: 10px; border-bottom: 1px solid var(--border); }
.comment .user { font-weight: 600; font-size: 13px; color: var(--accent); }
.comment .text { font-size: 14px; margin-top: 4px; }
.comment .time { font-size: 11px; color: var(--text2); margin-top: 4px; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📡 媒体提取工具</h1>
    <div class="sub">抖音 · 小红书 · B站 | 视频/图文提取</div>
  </div>

  <div class="card">
    <div class="card-title">🔗 粘贴链接</div>
    <div class="platforms">
      <span class="platform-badge douyin active" data-p="douyin">🎵 抖音</span>
      <span class="platform-badge xiaohongshu" data-p="xiaohongshu">📕 小红书</span>
      <span class="platform-badge bilibili" data-p="bilibili">📺 B站</span>
    </div>
    <div class="input-row">
      <input type="text" id="linkInput" placeholder="粘贴抖音/小红书/B站分享链接...">
      <button class="btn btn-primary" id="btnParse">🔍 解析</button>
    </div>
    <div class="progress-wrap hidden" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>
  </div>

  <div class="card hidden" id="resultCard">
    <div class="card-title">📋 解析结果</div>
    <div id="resultArea"></div>
  </div>

  <div class="card hidden" id="commentCard">
    <div class="card-title">💬 评论</div>
    <div id="commentArea"></div>
  </div>

  <div class="card">
    <div class="log-area" id="logArea">
      <div class="log-line info">🟢 工具就绪，粘贴链接开始解析</div>
    </div>
  </div>
</div>

<script>
const $ = (s) => document.querySelector(s);
const state = { proxyUrl: 'https://admirable-blini-006cf0.netlify.app/api/extract', result: null };

function log(msg, cls = 'info') {
  const d = document.createElement('div');
  d.className = 'log-line ' + cls;
  d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  $('#logArea').appendChild(d);
  $('#logArea').scrollTop = $('#logArea').scrollHeight;
}

function showProgress(text) {
  $('#progressWrap').classList.remove('hidden');
  $('#progressText').textContent = text;
  $('#progressFill').style.width = '30%';
}
function hideProgress() { $('#progressWrap').classList.add('hidden'); }

// Platform badges
document.querySelectorAll('.platform-badge').forEach(badge => {
  badge.addEventListener('click', () => {
    document.querySelectorAll('.platform-badge').forEach(b => b.classList.remove('active'));
    badge.classList.add('active');
  });
});

// Parse button
$('#btnParse').addEventListener('click', async () => {
  const url = $('#linkInput').value.trim();
  if (!url) { log('请粘贴链接', 'error'); return; }

  $('#btnParse').disabled = true;
  $('#btnParse').textContent = '⏳ 解析中...';
  showProgress('正在解析...');
  log('开始解析: ' + url);

  try {
    const resp = await fetch(state.proxyUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, type: 'parse' })
    });
    const data = await resp.json();
    $('#progressFill').style.width = '80%';

    if (!data.success && data.error) throw new Error(data.error);
    state.result = data;
    renderResult(data);
    $('#resultCard').classList.remove('hidden');
    $('#progressFill').style.width = '100%';
    log('✅ 解析成功: ' + (data.title || '未知标题'), 'success');
  } catch (err) {
    log('❌ 解析失败: ' + err.message, 'error');
  } finally {
    hideProgress();
    $('#btnParse').disabled = false;
    $('#btnParse').textContent = '🔍 解析';
  }
});

function renderResult(data) {
  const area = $('#resultArea');
  let html = '';

  if (data.type === 'video' && data.videoUrl) {
    html += '<video src="' + data.videoUrl + '" controls style="width:100%;max-height:400px;border-radius:8px;background:#000"></video>';
  } else if (data.type === 'video') {
    html += '<div style="padding:40px;text-align:center;color:var(--text2)">🎬 视频链接需通过第三方工具获取</div>';
  }

  if (data.cover && !data.videoUrl) {
    html += '<img src="' + data.cover + '" style="width:100%;max-height:300px;object-fit:contain;border-radius:8px;background:#000">';
  }

  if (data.images && data.images.length > 0) {
    html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px">';
    data.images.forEach(img => {
      html += '<img src="' + img + '" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;cursor:pointer" onclick="window.open(\'' + img + '\')">';
    });
    html += '</div>';
  }

  html += '<div style="margin-top:12px">';
  if (data.title) html += '<div style="font-weight:600;font-size:15px">' + data.title + '</div>';
  if (data.author) html += '<div style="color:var(--accent);font-size:13px;margin-top:4px">👤 ' + data.author + '</div>';
  if (data.description) html += '<div style="color:var(--text2);font-size:13px;margin-top:4px">' + data.description + '</div>';
  html += '</div>';

  html += '<div class="result-actions">';
  if (data.videoUrl) html += '<button class="btn btn-primary btn-sm" onclick="downloadMedia(\'' + data.videoUrl + '\', \'video.mp4\')">⬇ 下载视频</button>';
  if (data.cover) html += '<button class="btn btn-outline btn-sm" onclick="downloadMedia(\'' + data.cover + '\', \'cover.jpg\')">🖼 下载封面</button>';
  if (data.images) html += '<button class="btn btn-outline btn-sm" onclick="downloadAllImages()">📦 下载全部图片</button>';
  html += '</div>';

  area.innerHTML = html;
}

function downloadMedia(url, filename) {
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.target = '_blank';
  a.click();
  log('开始下载: ' + filename);
}

function downloadAllImages() {
  if (!state.result || !state.result.images) return;
  state.result.images.forEach((img, i) => {
    setTimeout(() => downloadMedia(img, 'image_' + (i+1) + '.jpg'), i * 500);
  });
  log('正在下载 ' + state.result.images.length + ' 张图片...');
}

log('💡 支持: 抖音短链 / 小红书分享链接 / B站视频链接');
</script>
</body>
</html>
